<!DOCTYPE html>
<html>
<head>
    <title>Minecraft 1.8.8 Iframe Embed</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Hide scrollbars if the iframe takes the whole page */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* Removes the default iframe border */
        }
    </style>
</head>
<body>

<!-- The iframe tag to embed the Minecraft game -->
<iframe src="[URL_OF_YOUR_EAGLERCRAFT_PAGE]" title="Minecraft 1.8.8 Game">
    Your browser does not support iframes.
</iframe>

</body>
</html>
